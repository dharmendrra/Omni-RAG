<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" font-family="Inter, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <style>
      .store{ fill:#fef9c3; stroke:#ca8a04; stroke-width:2px; }
      .svc  { fill:#dbeafe; stroke:#2563eb; stroke-width:2px; }
      .vec  { fill:#ede9fe; stroke:#7c3aed; stroke-width:2px; }
      .llm  { fill:#dcfce7; stroke:#16a34a; stroke-width:2px; }
      .ui   { fill:#ffffff; stroke:#94a3b8; stroke-width:1.6px; }
      .title{ font-size:22px; font-weight:700; fill:#0f172a; }
      .sub  { font-size:17px; fill:#475569; }
      .edge { stroke:#2563eb; stroke-width:2.5px; fill:none; }
      .lbl  { font-size:16px; fill:#334155; paint-order:stroke; stroke:#ffffff; stroke-width:6px; stroke-linejoin:round; }
      .phase{ font-size:19px; font-weight:700; fill:#94a3b8; }
    </style>
  </defs>
  <rect x="0" y="0" width="1200" height="700" fill="#ffffff"/>

  <text class="phase" x="60" y="42">① Ingestion · :8080</text>
  <text class="phase" x="60" y="452">② Retrieval · :8081</text>

  <!-- ingestion edges -->
  <path class="edge" d="M250,140 L318,140" marker-end="url(#arrow)"/>
  <path class="edge" d="M415,189 L415,250" marker-end="url(#arrow)"/>
  <path class="edge" d="M510,158 C566,212 590,262 616,292" marker-end="url(#arrow)"/>
  <path class="edge" d="M510,116 C770,86 872,180 950,286" marker-end="url(#arrow)"/>
  <!-- retrieval edges -->
  <path class="edge" d="M250,520 L318,520" marker-end="url(#arrow)"/>
  <path class="edge" d="M318,556 L250,556" marker-end="url(#arrow)"/>
  <path class="edge" d="M510,506 C566,458 592,410 628,388" marker-end="url(#arrow)"/>
  <path class="edge" d="M470,584 C640,662 882,642 985,414" marker-end="url(#arrow)"/>
  <path class="edge" d="M510,536 L596,536" marker-end="url(#arrow)"/>

  <!-- labels -->
  <text class="lbl" x="284" y="128" text-anchor="middle">PDF</text>
  <text class="lbl" x="470" y="226" text-anchor="middle">store PDF</text>
  <text class="lbl" x="586" y="218" text-anchor="middle">chunk + embed</text>
  <text class="lbl" x="744" y="96" text-anchor="middle">upsert vectors</text>
  <text class="lbl" x="284" y="508" text-anchor="middle">query</text>
  <text class="lbl" x="284" y="576" text-anchor="middle">answer</text>
  <text class="lbl" x="566" y="430" text-anchor="middle">embed query</text>
  <text class="lbl" x="788" y="652" text-anchor="middle">search / matches</text>
  <text class="lbl" x="553" y="524" text-anchor="middle">prompt</text>

  <!-- ingestion nodes -->
  <rect class="ui" x="60" y="95" width="190" height="90" rx="11"/>
  <text class="title" x="155" y="132" text-anchor="middle">Upload UI</text>
  <text class="sub"   x="155" y="157" text-anchor="middle">PDFs · books</text>

  <rect class="svc" x="318" y="93" width="194" height="94" rx="11"/>
  <text class="title" x="415" y="133" text-anchor="middle">Ingestion</text>
  <text class="sub"   x="415" y="158" text-anchor="middle">LangChainGo chunks</text>

  <rect class="store" x="320" y="250" width="190" height="82" rx="11"/>
  <text class="title" x="415" y="287" text-anchor="middle">MongoDB GridFS</text>
  <text class="sub"   x="415" y="311" text-anchor="middle">raw PDFs</text>

  <!-- shared nodes -->
  <rect class="llm" x="600" y="292" width="180" height="92" rx="11"/>
  <text class="title" x="690" y="330" text-anchor="middle">Ollama</text>
  <text class="sub"   x="690" y="354" text-anchor="middle">embeddings</text>

  <rect class="vec" x="930" y="284" width="220" height="126" rx="12"/>
  <text class="title" x="1040" y="338" text-anchor="middle">Pinecone</text>
  <text class="sub"   x="1040" y="363" text-anchor="middle">vector index</text>

  <!-- retrieval nodes -->
  <rect class="ui" x="60" y="490" width="190" height="90" rx="11"/>
  <text class="title" x="155" y="527" text-anchor="middle">Search UI</text>
  <text class="sub"   x="155" y="552" text-anchor="middle">SSE stream</text>

  <rect class="svc" x="318" y="488" width="194" height="94" rx="11"/>
  <text class="title" x="415" y="528" text-anchor="middle">Retrieval</text>
  <text class="sub"   x="415" y="553" text-anchor="middle">:8081</text>

  <rect class="llm" x="596" y="490" width="204" height="92" rx="11"/>
  <text class="title" x="698" y="528" text-anchor="middle">Claude · Ollama</text>
  <text class="sub"   x="698" y="552" text-anchor="middle">grounded answer</text>
</svg>
